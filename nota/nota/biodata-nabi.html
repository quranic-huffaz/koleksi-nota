<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota & Game: Biodata Nabi | Premium Edu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .glass-effect { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .note-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .note-card:active { transform: scale(0.95); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .vibrate { animation: shake 0.1s linear infinite; }
        .hidden-content { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .show-content { max-height: 100px; opacity: 1; margin-top: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation -->
    <nav class="p-6">
        <a href="../index.html" class="text-blue-400 flex items-center gap-2 font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Dashboard
        </a>
    </nav>

    <main class="container mx-auto px-5 max-w-2xl">
        <!-- Section 1: Nota Peta Minda Interaktif -->
        <section id="note-section">
            <div class="text-center mb-10">
                <span class="bg-blue-500/10 text-blue-400 px-4 py-1 rounded-full text-xs font-bold tracking-widest">PETA MINDA INTERAKTIF</span>
                <h1 class="text-3xl font-bold mt-4 text-white">Biodata Nabi Muhammad SAW</h1>
                <p class="text-slate-400 text-sm mt-2">Klik pada kad untuk melihat jawapan</p>
            </div>

            <div class="grid grid-cols-1 gap-4" id="note-container">
                <!-- Data Nota akan dijana oleh JS -->
            </div>

            <!-- Button Game -->
            <div class="mt-12 text-center">
                <button onclick="showConfirm()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-2xl shadow-lg shadow-blue-900/20 transition-all w-full md:w-auto">
                    🚀 Game Latih Tubi
                </button>
            </div>
        </section>

        <!-- Section 2: Ruang Game (Hidden by default) -->
        <section id="game-section" class="hidden">
            <div class="glass-effect rounded-3xl p-8 sticky top-5 z-10 mb-8 border-b border-blue-500/30">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest">Masa Berjalan</p>
                        <h2 id="timer" class="text-2xl font-mono font-bold text-blue-400">00:00</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-slate-400 uppercase tracking-widest">Progres</p>
                        <h2 id="progress" class="text-2xl font-bold text-white">1/9</h2>
                    </div>
                </div>
            </div>

            <div id="quiz-container" class="space-y-6">
                <!-- Soalan akan muncul di sini -->
            </div>

            <button onclick="submitGame()" class="mt-10 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-900/20">
                Hantar Jawapan
            </button>
        </section>

        <!-- Section 3: Result (Hidden) -->
        <section id="result-section" class="hidden text-center">
            <div class="glass-effect rounded-3xl p-10">
                <div class="text-6xl mb-6">🏆</div>
                <h2 class="text-3xl font-bold text-white">Keputusan Anda</h2>
                <div class="flex justify-center gap-10 my-8">
                    <div><p class="text-slate-400 text-sm">Markah</p><p id="final-score" class="text-3xl font-bold text-emerald-400">0/0</p></div>
                    <div><p class="text-slate-400 text-sm">Masa</p><p id="final-time" class="text-3xl font-bold text-blue-400">0s</p></div>
                </div>
                <div class="bg-white/5 p-6 rounded-2xl mb-8">
                    <p id="motivation" class="italic text-slate-300">"Teruskan usaha!"</p>
                </div>
                <button onclick="location.reload()" class="text-blue-400 font-semibold flex items-center justify-center gap-2 mx-auto">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5M20 4.2a9 9 0 100 15.6" stroke-width="2"/></svg>
                    Ulang Semula
                </button>
            </div>
        </section>
    </main>

    <!-- Modal Noti (Fintech Cartoon Style) -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[32px] p-8 max-w-sm w-full text-center transform scale-90 transition-transform">
            <div class="text-6xl mb-4">🎮</div>
            <h3 class="text-2xl font-bold text-slate-900">Sedia untuk beraksi?</h3>
            <p class="text-slate-500 mt-2">Pastikan anda sudah hafal biodata tadi. Masa akan dikira!</p>
            <div class="flex flex-col gap-3 mt-8">
                <button onclick="startGame()" class="bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">Mula Sekarang</button>
                <button onclick="hideConfirm()" class="text-slate-400 font-medium py-2">Nanti dulu</button>
            </div>
        </div>
    </div>

    <script>
        const dataNota = [
            { t: "Bapa", j: "Abdullah bin Abdul Muttalib" },
            { t: "Ibu", j: "Aminah binti Wahab" },
            { t: "Datuk", j: "Abdul Muttalib bin Hashim" },
            { t: "Ibu susuan", j: "Suwaibatul Aslamiah & Halimatun Sa'adiah" },
            { t: "Istri pertama", j: "Khadijah binti Khuwailid" },
            { t: "Tarikh lahir", j: "12 Rabiulawal" },
            { t: "Tahun lahir", j: "Tahun Gajah" },
            { t: "Kabilah/Bangsa", j: "Quraisy" },
            { t: "Jumlah anak", j: "7 orang" }
        ];

        let startTime, timerInterval;

        // Generate Nota
        const container = document.getElementById('note-container');
        dataNota.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'note-card glass-effect p-6 rounded-2xl';
            card.onclick = () => {
                const content = card.querySelector('.hidden-content');
                content.classList.toggle('show-content');
                if (window.navigator.vibrate) window.navigator.vibrate(50); // Getaran Ringan
                card.classList.add('vibrate');
                setTimeout(() => card.classList.remove('vibrate'), 200);
            };
            card.innerHTML = `<p class="text-blue-400 text-xs font-bold uppercase tracking-wider">${item.t}</p>
                              <div class="hidden-content text-xl font-semibold text-white">${item.j}</div>`;
            container.appendChild(card);
        });

        // Game Functions
        function showConfirm() { 
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }
        function hideConfirm() { 
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        function startGame() {
            hideConfirm();
            document.getElementById('note-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            
            // Generate Quiz
            const quizBox = document.getElementById('quiz-container');
            dataNota.forEach((item, i) => {
                quizBox.innerHTML += `
                    <div class="glass-effect p-6 rounded-2xl">
                        <label class="text-sm text-slate-400 block mb-3 font-medium uppercase tracking-widest">${item.t} Nabi?</label>
                        <input type="text" data-ans="${item.j}" class="quiz-input w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" placeholder="Taip jawapan anda...">
                    </div>`;
            });

            // Start Timer
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const seconds = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function submitGame() {
            clearInterval(timerInterval);
            let score = 0;
            const inputs = document.querySelectorAll('.quiz-input');
            
            inputs.forEach(input => {
                if (input.value.toLowerCase().trim() === input.getAttribute('data-ans').toLowerCase().trim()) {
                    score++;
                }
            });

            const totalTime = document.getElementById('timer').innerText;
            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/${dataNota.length}`;
            document.getElementById('final-time').innerText = totalTime;

            // Motivasi
            const moti = document.getElementById('motivation');
            if (score === dataNota.length) moti.innerText = "Maa syaa Allah! Anda memang pakar Sirah Nabawiyyah! ⭐";
            else if (score > 5) moti.innerText = "Bagus! Sikit lagi nak sempurna. Teruskan mengulang kaji. 💪";
            else moti.innerText = "Jangan menyerah, ilmu itu cahaya. Jom cuba lagi sekali! 📚";
        }
    </script>
</body>
</html>
